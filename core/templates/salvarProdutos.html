{% extends 'global/base.html' %}
{% block title %}
  Salvar Produtos
{% endblock %}

{% block content %}
    <h2 style="text-align: center;">──────────────────── ⋆⋅☆⋅⋆ ────────────────────</h2>
    <div class="container">
        <h1>Cadastro de produtos</h1>
        <form action="{% url 'urlsalvarProdutos' %}" method="POST">
            {% csrf_token %}

            <table class="table">
                {{form.as_table}}
            </table>
            <input type="submit" value="Salvar" class="btn btn-success">
        </form>
    </div>
{% endblock %}
