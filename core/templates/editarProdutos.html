{% load bootstrap5 %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar produtos</title>
    {% bootstrap_css %}
</head>
<body>

    <h2 style="text-align: center;">──────────────────── ⋆⋅☆⋅⋆ ────────────────────</h2>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a href="{% url 'urlprodutos' %}" class="nav-link">Produtos</a>
                </li>

                <li class="nav-item active">
                    <a href="{% url 'urlclientes' %}" class="nav-link">Clientes</a>
                </li>

                <li class="nav-item active">
                    <a href="{% url 'urlsalvarClientes' %}" class="nav-link">Salvar clientes</a>
                </li>

                <li class="nav-item active">
                    <a href="{% url 'urlcontato' %}" class="nav-link">Contato</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Editar produtos</h1>
        <form action="#" method="POST">
            {% csrf_token %}

            <table class="table">
                {{form.as_table}}
            </table>
            <input type="submit" value="Salvar" class="btn btn-success">
        </form>
    </div>
</body>
</html>
