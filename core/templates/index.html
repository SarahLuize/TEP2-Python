{% load bootstrap5 %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página inicial</title>
  {% bootstrap_css %}
</head>

<body>

  <h2 style="text-align: center;">──────────────────── ⋆⋅☆⋅⋆ ────────────────────</h2>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a href="{% url 'urlentrar' %}" class="nav-link">Login</a>
                </li>
                <li class="nav-item active">
                    <a href="{% url 'urlcontato' %}" class="nav-link">Contato</a>
                </li>
            </ul>
        </div>
    </nav>

  <h1 style="text-align:center">Página inicial</h1>
  <h2>{{ curso }}</h2>

  <!--https://placehold.co/200x150.png-->

  <div class="container mt-4">
    <div class="row row-cols-1 row-cols-md-3 g-4">

      {% for p in prod %}
      <div class="col">
        <div class="card h-100">
          <img src="https://placehold.co/200x150.png" class="card-img-top" alt="...">
          <div class="card-body">
            <h5 class="card-title">{{ p.nome }}</h5>
            <p class="card-text">{{ p.descricao }}</p>
          </div>
          <div class="card-footer">
            <small class="text-muted">R${{ p.preco }}</small>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

</body>
</html>
